# web.yaml — Combined manifest (single-apply file)
# Apply all: kubectl apply -f web.yaml

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
data:
  APP_VERSION: "v1"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: manireet0607/k8srollback:v1
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: web-config

---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  selector:
    app: web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: NodePort
